appId: com.osctool.app
productName: OSC Tool
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - electron/**/*.js
  - "!electron/**/*.ts"
  - "!node_modules/.cache"
mac:
  target:
    - target: dmg
      arch:
        - universal
  category: public.app-category.utilities
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: trimotion
  repo: Osc_Tool
  private: true
