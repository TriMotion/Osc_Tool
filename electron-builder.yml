appId: com.oscilot.app
productName: Oscilot
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - electron/main.js
  - electron/preload.js
  - web/**/*
  - package.json
  - "!node_modules"
asarUnpack:
  - out/_next/**/*
  - "**/node_modules/@julusian/midi/build/Release/*.node"
mac:
  target:
    - target: dmg
      arch:
        - universal
  category: public.app-category.utilities
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: TriMotion
  repo: Osc_Tool
