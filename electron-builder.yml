appId: com.oscilot.app
productName: Oscilot
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - electron/**/*.js
  - web/**/*
  - package.json
  - "node_modules/**/*"
  - "!**/node_modules/next/**"
  - "!**/node_modules/@next/**"
  - "!**/node_modules/react/**"
  - "!**/node_modules/react-dom/**"
  - "!**/node_modules/framer-motion/**"
  - "!**/node_modules/scheduler/**"
  - "!**/node_modules/sharp/**"
  - "!**/node_modules/@img/**"
  - "!**/node_modules/electron/**"
  - "!**/node_modules/electron-builder/**"
  - "!**/node_modules/electron-winstaller/**"
  - "!**/node_modules/@electron/**"
  - "!**/node_modules/esbuild/**"
  - "!**/node_modules/@esbuild/**"
  - "!**/node_modules/tsx/**"
  - "!**/node_modules/@types/**"
  - "!**/node_modules/typescript/**"
  - "!**/node_modules/tailwindcss/**"
  - "!**/node_modules/@tailwindcss/**"
  - "!**/node_modules/postcss/**"
  - "!**/node_modules/autoprefixer/**"
  - "!**/node_modules/concurrently/**"
  - "!**/node_modules/wait-on/**"
  - "!**/node_modules/@swc/**"
  - "!**/node_modules/caniuse-lite/**"
extraResources:
  - from: project
    to: project
    filter: ["**/*"]
asarUnpack:
  - out/_next/**/*
  - "**/node_modules/@julusian/midi/build/Release/*.node"
mac:
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  category: public.app-category.utilities
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: TriMotion
  repo: Osc_Tool
