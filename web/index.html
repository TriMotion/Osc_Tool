<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSC Tool — Remote</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwindcss.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            surface: { DEFAULT: "#1a1a2e", light: "#222244", lighter: "#2a2a4a" },
            accent: { DEFAULT: "#00d4aa", dim: "#00a080" },
          },
        },
      },
    };
  </script>
  <style>
    .deck-grid {
      display: grid;
      gap: 6px;
    }
    .deck-item {
      min-height: 56px;
      user-select: none;
      touch-action: none;
    }
    .btn-trigger {
      transition: background-color 0.08s, transform 0.08s;
    }
    .btn-trigger:active {
      transform: scale(0.95);
    }
    .btn-on {
      filter: brightness(1.2);
      box-shadow: 0 0 10px currentColor;
    }
    .slider-track {
      position: relative;
      background: #2a2a4a;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
    }
    .slider-fill {
      background: #00d4aa;
      border-radius: 6px;
      transition: none;
      pointer-events: none;
    }
    .xy-pad {
      position: relative;
      background: #222244;
      border-radius: 8px;
      cursor: crosshair;
      overflow: hidden;
    }
    .xy-dot {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #00d4aa;
      box-shadow: 0 0 8px #00d4aa;
      transform: translate(-50%, -50%);
      pointer-events: none;
      transition: none;
    }
    .xy-crosshair-h, .xy-crosshair-v {
      position: absolute;
      background: rgba(0, 212, 170, 0.2);
      pointer-events: none;
    }
    .xy-crosshair-h { height: 1px; left: 0; right: 0; }
    .xy-crosshair-v { width: 1px; top: 0; bottom: 0; }
    .group-box {
      border-radius: 8px;
      border: 1.5px solid;
      padding: 4px;
    }
    .tab-btn {
      padding: 6px 16px;
      border-radius: 6px 6px 0 0;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      border: 1px solid transparent;
      border-bottom: none;
    }
    .tab-btn.active {
      background: #222244;
      color: #00d4aa;
      border-color: rgba(255,255,255,0.1);
    }
    .tab-btn:not(.active) {
      background: transparent;
      color: #6b7280;
    }
    .tab-btn:not(.active):hover {
      color: #9ca3af;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body class="bg-surface text-gray-100 min-h-screen p-4">
  <div id="app">
    <div class="flex items-center justify-between mb-3">
      <h1 class="text-accent font-bold text-lg">OSC Tool <span class="text-gray-500 text-sm font-normal">Remote</span></h1>
      <div class="flex items-center gap-2 text-xs text-gray-500">
        <span id="status" class="w-2 h-2 rounded-full bg-gray-600"></span>
        <span id="connStatus">Connecting...</span>
        <span class="text-gray-600">·</span>
        <span id="throughput">0 msg/s</span>
      </div>
    </div>

    <!-- Tab bar -->
    <div class="flex border-b border-white/10 mb-0">
      <button class="tab-btn active" onclick="switchTab('monitor')">Monitor</button>
      <button class="tab-btn" onclick="switchTab('deck')">Deck</button>
    </div>

    <!-- Monitor tab -->
    <div id="tab-monitor" class="tab-panel active bg-surface-light border border-white/10 border-t-0 rounded-b-lg rounded-tr-lg p-4">
      <div class="flex gap-2 mb-4 items-end flex-wrap">
        <div>
          <label class="block text-xs text-gray-500 mb-1">Send to Host</label>
          <input id="host" type="text" value="127.0.0.1" class="bg-surface-lighter border border-white/10 rounded-lg px-3 py-2 text-sm w-36" />
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">Port</label>
          <input id="port" type="text" value="8000" class="bg-surface-lighter border border-white/10 rounded-lg px-3 py-2 text-sm w-20" />
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">Address</label>
          <input id="address" type="text" value="/test" class="bg-surface-lighter border border-white/10 rounded-lg px-3 py-2 text-sm w-40 font-mono" />
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">Value (float)</label>
          <input id="value" type="number" value="1.0" step="0.01" class="bg-surface-lighter border border-white/10 rounded-lg px-3 py-2 text-sm w-24" />
        </div>
        <button onclick="sendMsg()" class="px-4 py-2 bg-accent text-surface font-medium rounded-lg text-sm">Send</button>
      </div>
      <div id="log" class="bg-surface-lighter border border-white/5 rounded-lg p-3 font-mono text-xs h-[55vh] overflow-auto"></div>
    </div>

    <!-- Deck tab -->
    <div id="tab-deck" class="tab-panel bg-surface-light border border-white/10 border-t-0 rounded-b-lg rounded-tr-lg p-4">
      <div id="deck-empty" class="text-gray-500 text-sm py-8 text-center">Waiting for deck data...</div>
      <div id="deck-ui" class="hidden">
        <!-- Deck + Page selectors -->
        <div class="flex gap-3 mb-4 items-center flex-wrap">
          <div>
            <label class="block text-xs text-gray-500 mb-1">Deck</label>
            <select id="deck-select" onchange="onDeckSelect()" class="bg-surface-lighter border border-white/10 rounded-lg px-3 py-2 text-sm min-w-32"></select>
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">Page</label>
            <div id="page-tabs" class="flex gap-1"></div>
          </div>
        </div>
        <!-- Grid container -->
        <div id="grid-container" class="overflow-auto"></div>
      </div>
    </div>
  </div>

  <script>
    // ---- State ----
    let decks = [];
    let activeDeckId = null;
    let activePageId = null;
    // Toggle states: itemId -> bool
    const toggleStates = {};

    // ---- WebSocket ----
    const log = document.getElementById("log");
    const statusDot = document.getElementById("status");
    const throughputEl = document.getElementById("throughput");
    const connStatus = document.getElementById("connStatus");

    const ws = new WebSocket(`ws://${location.host}`);

    ws.onopen = () => {
      connStatus.textContent = "Connected";
      statusDot.className = "w-2 h-2 rounded-full bg-green-400";
    };
    ws.onclose = () => {
      connStatus.textContent = "Disconnected";
      statusDot.className = "w-2 h-2 rounded-full bg-red-400";
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === "message") {
        const d = msg.data;
        const t = new Date(d.timestamp);
        const time = `${t.getHours().toString().padStart(2,"0")}:${t.getMinutes().toString().padStart(2,"0")}:${t.getSeconds().toString().padStart(2,"0")}.${t.getMilliseconds().toString().padStart(3,"0")}`;
        const args = d.args.map(a => `${a.value} (${a.type})`).join(", ");
        const row = document.createElement("div");
        row.className = "py-1 border-b border-white/5 flex gap-4";
        row.innerHTML = `<span class="text-gray-500 w-24">${time}</span><span class="text-gray-400 w-36">${d.sourceIp}:${d.sourcePort}</span><span class="text-accent">${d.address}</span><span class="text-gray-300">${args}</span>`;
        log.appendChild(row);
        log.scrollTop = log.scrollHeight;
      } else if (msg.type === "throughput") {
        throughputEl.textContent = `${msg.data} msg/s`;
      } else if (msg.type === "deck-state") {
        decks = msg.data;
        renderDeckUI();
      }
    };

    function sendMsg() {
      ws.send(JSON.stringify({
        type: "send",
        host: document.getElementById("host").value,
        port: parseInt(document.getElementById("port").value),
        address: document.getElementById("address").value,
        args: [{ type: "f", value: parseFloat(document.getElementById("value").value) }],
      }));
    }

    // ---- Tab switching ----
    function switchTab(name) {
      document.querySelectorAll(".tab-btn").forEach((b, i) => {
        b.classList.toggle("active", ["monitor","deck"][i] === name);
      });
      document.querySelectorAll(".tab-panel").forEach((p, i) => {
        p.classList.toggle("active", ["tab-monitor","tab-deck"][i] === `tab-${name}`);
      });
    }

    // ---- Deck rendering ----
    function renderDeckUI() {
      const empty = document.getElementById("deck-empty");
      const ui = document.getElementById("deck-ui");
      if (!decks || decks.length === 0) {
        empty.classList.remove("hidden");
        ui.classList.add("hidden");
        return;
      }
      empty.classList.add("hidden");
      ui.classList.remove("hidden");

      // Populate deck select
      const sel = document.getElementById("deck-select");
      const prevDeck = activeDeckId;
      sel.innerHTML = "";
      for (const d of decks) {
        const opt = document.createElement("option");
        opt.value = d.id;
        opt.textContent = d.name;
        sel.appendChild(opt);
      }
      // Restore or default
      if (prevDeck && decks.find(d => d.id === prevDeck)) {
        sel.value = prevDeck;
        activeDeckId = prevDeck;
      } else {
        activeDeckId = decks[0].id;
        sel.value = activeDeckId;
      }
      renderPageTabs();
    }

    function onDeckSelect() {
      activeDeckId = document.getElementById("deck-select").value;
      activePageId = null;
      renderPageTabs();
    }

    function renderPageTabs() {
      const deck = decks.find(d => d.id === activeDeckId);
      if (!deck) return;
      const container = document.getElementById("page-tabs");
      container.innerHTML = "";
      if (!activePageId || !deck.pages.find(p => p.id === activePageId)) {
        activePageId = deck.pages[0]?.id ?? null;
      }
      for (const page of deck.pages) {
        const btn = document.createElement("button");
        btn.textContent = page.name;
        btn.className = `px-3 py-1.5 rounded-md text-xs font-medium border transition-colors ${
          page.id === activePageId
            ? "bg-accent/20 text-accent border-accent/40"
            : "bg-surface-lighter text-gray-400 border-white/10 hover:text-gray-200"
        }`;
        btn.onclick = () => {
          activePageId = page.id;
          renderPageTabs();
          renderGrid();
        };
        container.appendChild(btn);
      }
      renderGrid();
    }

    function renderGrid() {
      const deck = decks.find(d => d.id === activeDeckId);
      const page = deck?.pages.find(p => p.id === activePageId);
      const container = document.getElementById("grid-container");
      container.innerHTML = "";
      if (!deck || !page) return;

      const cols = deck.gridColumns || 8;
      const rows = deck.gridRows || 6;
      const cellSize = Math.min(Math.floor((window.innerWidth - 64) / cols), 96);

      const grid = document.createElement("div");
      grid.className = "deck-grid";
      grid.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
      grid.style.gridTemplateRows = `repeat(${rows}, ${cellSize}px)`;
      grid.style.width = `${cols * cellSize + (cols - 1) * 6}px`;

      // Render groups
      for (const group of page.groups) {
        const el = renderGroup(group, deck, page, cellSize);
        grid.appendChild(el);
      }

      // Render loose items
      for (const item of page.items) {
        const el = renderItem(item, deck, page, cellSize, false, 0, 0);
        grid.appendChild(el);
      }

      container.appendChild(grid);
    }

    function renderGroup(group, deck, page, cellSize) {
      const el = document.createElement("div");
      el.className = "group-box";
      el.style.gridColumn = `${group.col + 1} / span ${group.colSpan}`;
      el.style.gridRow = `${group.row + 1} / span ${group.rowSpan}`;
      el.style.borderColor = group.color || "#444466";
      el.style.backgroundColor = hexWithAlpha(group.color || "#444466", 0.08);

      const label = document.createElement("div");
      label.className = "text-xs font-medium mb-1 px-1";
      label.style.color = group.color || "#aaaacc";
      label.textContent = group.name;
      el.appendChild(label);

      const innerGrid = document.createElement("div");
      innerGrid.className = "deck-grid";
      innerGrid.style.gridTemplateColumns = `repeat(${group.colSpan}, ${cellSize}px)`;
      innerGrid.style.gridTemplateRows = `repeat(${group.rowSpan}, ${cellSize}px)`;

      for (const item of group.items) {
        const itemEl = renderItem(item, deck, page, cellSize, true, group.col, group.row);
        innerGrid.appendChild(itemEl);
      }
      el.appendChild(innerGrid);
      return el;
    }

    function renderItem(item, deck, page, cellSize, inGroup, groupCol, groupRow) {
      const el = document.createElement("div");
      el.className = "deck-item";
      if (inGroup) {
        el.style.gridColumn = `${item.col + 1} / span ${item.colSpan}`;
        el.style.gridRow = `${item.row + 1} / span ${item.rowSpan}`;
      } else {
        el.style.gridColumn = `${item.col + 1} / span ${item.colSpan}`;
        el.style.gridRow = `${item.row + 1} / span ${item.rowSpan}`;
      }

      const w = item.colSpan * cellSize + (item.colSpan - 1) * 6;
      const h = item.rowSpan * cellSize + (item.rowSpan - 1) * 6;
      el.style.width = `${w}px`;
      el.style.height = `${h}px`;

      if (item.type === "button") {
        renderButton(el, item, deck, page, w, h);
      } else if (item.type === "slider") {
        renderSlider(el, item, deck, page, w, h);
      } else if (item.type === "xy-pad") {
        renderXYPad(el, item, deck, page, w, h);
      }

      return el;
    }

    function renderButton(el, item, deck, page, w, h) {
      const cfg = item.config;
      const isToggle = cfg.mode === "toggle";
      const color = item.color || "#00d4aa";
      const on = toggleStates[item.id] || false;

      el.innerHTML = `
        <div class="btn-trigger flex items-center justify-center rounded-lg w-full h-full font-medium text-sm text-center select-none cursor-pointer ${on ? "btn-on" : ""}"
          style="background:${hexWithAlpha(color, on ? 0.4 : 0.15)};border:1.5px solid ${hexWithAlpha(color, on ? 0.8 : 0.3)};color:${color};padding:6px;word-break:break-word;">
          ${escHtml(item.name)}
        </div>`;

      const btn = el.querySelector("div");
      if (isToggle) {
        btn.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          const newState = !toggleStates[item.id];
          toggleStates[item.id] = newState;
          ws.send(JSON.stringify({ type: "deck-toggle", deckId: deck.id, pageId: page.id, itemId: item.id, state: newState }));
          // Update visual immediately
          btn.style.background = hexWithAlpha(color, newState ? 0.4 : 0.15);
          btn.style.borderColor = hexWithAlpha(color, newState ? 0.8 : 0.3);
          btn.classList.toggle("btn-on", newState);
        });
      } else {
        btn.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          ws.send(JSON.stringify({ type: "deck-trigger", deckId: deck.id, pageId: page.id, itemId: item.id }));
          btn.style.background = hexWithAlpha(color, 0.6);
          btn.style.borderColor = hexWithAlpha(color, 1);
        });
        btn.addEventListener("pointerup", () => {
          btn.style.background = hexWithAlpha(color, 0.15);
          btn.style.borderColor = hexWithAlpha(color, 0.3);
        });
        btn.addEventListener("pointerleave", () => {
          btn.style.background = hexWithAlpha(color, 0.15);
          btn.style.borderColor = hexWithAlpha(color, 0.3);
        });
      }
    }

    function renderSlider(el, item, deck, page, w, h) {
      const cfg = item.config;
      const color = item.color || "#00d4aa";
      const isVert = cfg.orientation === "vertical";
      const min = cfg.min ?? 0;
      const max = cfg.max ?? 1;

      // Default to midpoint
      let normalizedVal = 0.5;

      el.innerHTML = `
        <div style="width:${w}px;height:${h}px;display:flex;flex-direction:column;gap:4px;align-items:center;">
          <div class="text-xs font-medium" style="color:${color}">${escHtml(item.name)}</div>
          <div class="slider-track flex-1 w-full" style="position:relative;">
            <div class="slider-fill" id="sf-${item.id}" style="${isVert
              ? `position:absolute;bottom:0;left:0;right:0;height:${normalizedVal * 100}%;`
              : `position:absolute;top:0;left:0;bottom:0;width:${normalizedVal * 100}%;`}background:${color}"></div>
            <div class="absolute inset-0 flex items-center justify-center text-xs font-mono" style="color:${color};pointer-events:none;" id="sv-${item.id}">${(min + (max - min) * normalizedVal).toFixed(2)}</div>
          </div>
        </div>`;

      const track = el.querySelector(".slider-track");

      function getValueFromEvent(e) {
        const rect = track.getBoundingClientRect();
        if (isVert) {
          const rel = 1 - Math.max(0, Math.min(1, (e.clientY - rect.top) / rect.height));
          return rel;
        } else {
          return Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        }
      }

      function updateVisual(norm) {
        const fill = document.getElementById(`sf-${item.id}`);
        const valEl = document.getElementById(`sv-${item.id}`);
        if (fill) {
          if (isVert) fill.style.height = `${norm * 100}%`;
          else fill.style.width = `${norm * 100}%`;
        }
        if (valEl) valEl.textContent = (min + (max - min) * norm).toFixed(2);
      }

      let dragging = false;
      track.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        dragging = true;
        track.setPointerCapture(e.pointerId);
        normalizedVal = getValueFromEvent(e);
        updateVisual(normalizedVal);
        sendSlider(normalizedVal);
      });
      track.addEventListener("pointermove", (e) => {
        if (!dragging) return;
        normalizedVal = getValueFromEvent(e);
        updateVisual(normalizedVal);
        sendSlider(normalizedVal);
      });
      track.addEventListener("pointerup", () => { dragging = false; });

      function sendSlider(norm) {
        const val = min + (max - min) * norm;
        ws.send(JSON.stringify({ type: "deck-slider", deckId: deck.id, pageId: page.id, itemId: item.id, value: val }));
      }
    }

    function renderXYPad(el, item, deck, page, w, h) {
      const cfg = item.config;
      const color = item.color || "#00d4aa";
      const xMin = cfg.xMin ?? 0, xMax = cfg.xMax ?? 1;
      const yMin = cfg.yMin ?? 0, yMax = cfg.yMax ?? 1;

      let nx = 0.5, ny = 0.5;

      el.innerHTML = `
        <div style="width:${w}px;height:${h}px;display:flex;flex-direction:column;gap:2px;">
          <div class="text-xs font-medium px-1" style="color:${color}">${escHtml(item.name)}</div>
          <div class="xy-pad flex-1" id="xy-${item.id}" style="border:1.5px solid ${hexWithAlpha(color,0.3)};">
            <div class="xy-crosshair-h" id="xyh-${item.id}" style="top:${ny*100}%"></div>
            <div class="xy-crosshair-v" id="xyv-${item.id}" style="left:${nx*100}%"></div>
            <div class="xy-dot" id="xyd-${item.id}" style="left:${nx*100}%;top:${ny*100}%;background:${color};box-shadow:0 0 8px ${color}"></div>
          </div>
        </div>`;

      const pad = el.querySelector(".xy-pad");

      function getXY(e) {
        const rect = pad.getBoundingClientRect();
        return {
          nx: Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)),
          ny: Math.max(0, Math.min(1, (e.clientY - rect.top) / rect.height)),
        };
      }

      function updateVisual(nx, ny) {
        const dot = document.getElementById(`xyd-${item.id}`);
        const h = document.getElementById(`xyh-${item.id}`);
        const v = document.getElementById(`xyv-${item.id}`);
        if (dot) { dot.style.left = `${nx*100}%`; dot.style.top = `${ny*100}%`; }
        if (h) h.style.top = `${ny*100}%`;
        if (v) v.style.left = `${nx*100}%`;
      }

      let dragging = false;
      pad.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        dragging = true;
        pad.setPointerCapture(e.pointerId);
        const pos = getXY(e);
        nx = pos.nx; ny = pos.ny;
        updateVisual(nx, ny);
        sendXY(nx, ny);
      });
      pad.addEventListener("pointermove", (e) => {
        if (!dragging) return;
        const pos = getXY(e);
        nx = pos.nx; ny = pos.ny;
        updateVisual(nx, ny);
        sendXY(nx, ny);
      });
      pad.addEventListener("pointerup", () => { dragging = false; });

      function sendXY(nx, ny) {
        const x = xMin + (xMax - xMin) * nx;
        const y = yMin + (yMax - yMin) * ny;
        ws.send(JSON.stringify({ type: "deck-xy", deckId: deck.id, pageId: page.id, itemId: item.id, x, y }));
      }
    }

    // ---- Helpers ----
    function hexWithAlpha(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function escHtml(str) {
      return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    window.addEventListener("resize", () => {
      if (activeDeckId && activePageId) renderGrid();
    });
  </script>
</body>
</html>
